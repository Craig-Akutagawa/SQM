name: 构建并部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成静态 HTML 页面
        run: python 复习资料/generate_static_pages.py

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传网站文件到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个仓库根目录（含图片_files目录 + 复习资料/html_version/）
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
